version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: antennas-app:latest
    container_name: antennas-web
    restart: unless-stopped

    # Carrega variáveis do .env (sem defaults)
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED}
      HOST: ${HOST}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_DAYS: ${JWT_EXPIRES_DAYS}
      COOKIE_SECURE: ${COOKIE_SECURE}
      FORCE_HTTP: ${FORCE_HTTP}
      GDMS_BASE: ${GDMS_BASE}
      GDMS_OAUTH_URL: ${GDMS_OAUTH_URL}
      GDMS_CLIENT_ID: ${GDMS_CLIENT_ID}
      GDMS_CLIENT_SECRET: ${GDMS_CLIENT_SECRET}
      GDMS_SYNC_INTERVAL_MS: ${GDMS_SYNC_INTERVAL_MS}
      GDMS_PAGE_SIZE: ${GDMS_PAGE_SIZE}
      GDMS_SHOW: ${GDMS_SHOW}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      SUPERADMIN_NAME: ${SUPERADMIN_NAME}

    ports:
      - "${HOST_PORT}:${PORT}"

    # IMPORTANTe: persistência do SQLite em /app/data
    volumes:
      - appdata:/app/data

    networks:
      - web

  worker:
    image: antennas-app:latest
    container_name: antennas-gdms-cron
    restart: unless-stopped

    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED}
      DATABASE_URL: ${DATABASE_URL}
      GDMS_BASE: ${GDMS_BASE}
      GDMS_OAUTH_URL: ${GDMS_OAUTH_URL}
      GDMS_CLIENT_ID: ${GDMS_CLIENT_ID}
      GDMS_CLIENT_SECRET: ${GDMS_CLIENT_SECRET}
      GDMS_SYNC_INTERVAL_MS: ${GDMS_SYNC_INTERVAL_MS}
      GDMS_PAGE_SIZE: ${GDMS_PAGE_SIZE}
      GDMS_SHOW: ${GDMS_SHOW}

    depends_on:
      web:
        condition: service_started

    volumes:
      - appdata:/app/data

    networks:
      - web

    command: ["node", "./scripts/gdms-cron.mjs"]

volumes:
  appdata:

networks:
  web:
    external: true
