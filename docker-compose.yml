x-app-image: &app_image
  build:
    context: .
    dockerfile: Dockerfile
    args:
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
  image: ${APP_IMAGE}
  pull_policy: never

services:
  mysql:
    image: ${MYSQL_IMAGE}
    restart: unless-stopped
    command:
      - --port=${MYSQL_PORT:-3306}
      - --character-set-server=${MYSQL_CHARSET}
      - --collation-server=${MYSQL_COLLATION}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    expose:
      - "${MYSQL_PORT:-3306}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h mysql -P ${MYSQL_PORT:-3306} -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_net

  web:
    <<: *app_image
    restart: unless-stopped
    init: true
    env_file:
      - ./.env
    environment:
      NODE_ENV: ${NODE_ENV}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${HOST_PORT}:${PORT}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://web:' + (process.env.PORT || 3000) + '/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      app_net:
      web:
        aliases:
          - monitoring-grandstream-web

  worker:
    <<: *app_image
    restart: unless-stopped
    init: true
    env_file:
      - ./.env
    environment:
      APP_BASE_URL: ${APP_BASE_URL}
      SYNC_PATH: ${SYNC_PATH}
      SYNC_INTERVAL_MS: ${SYNC_INTERVAL_MS}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      web:
        condition: service_healthy
    entrypoint: ["node", "scripts/gdms-cron.mjs"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - app_net

volumes:
  mysql_data:

networks:
  app_net:
  web:
    external: true
